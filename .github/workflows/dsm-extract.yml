name: php build xx IR

on:
  workflow_dispatch:

permissions:
  checks: write
  contents: write
  packages: read

jobs:
  php-application-build:
    runs-on: ubuntu-latest
    name: Run build with anomalies
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          
      - name: Install project dependencies
        run: composer install
